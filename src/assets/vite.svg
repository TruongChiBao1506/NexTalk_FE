<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>
    <!-- Accent Gradient -->
    <linearGradient id="bubbleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0369a1" />
    </linearGradient>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#4f46e5" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Base Rounded Circle -->
  <rect x="24" y="24" width="464" height="464" rx="108" fill="url(#bgGrad)" />

  <!-- Outer Chat Bubble (White) -->
  <path d="M160 330 h150 c35 0 64 -29 64 -64 s-29 -64 -64 -64 H160 c-35 0 -64 29 -64 64 c0 17 7 33 18 44 l-15 26 c-2 4 2 8 6 6 l33 -15z" fill="#ffffff" filter="url(#shadow)" />

  <!-- Inner Chat Bubble (Cyan/Blue) -->
  <path d="M200 285 h80 c18 0 32 -14 32 -32 s-14 -32 -32 -32 H200 c-18 0 -32 14 -32 32 c0 8 3 16 9 22 l-8 14 c-1 2 1 4 3 3 l16 -7z" fill="url(#bubbleGrad)" />

  <!-- Stylized letter 'N' -->
  <path d="M224 234 v20 l16 -20 v20" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
</svg>
